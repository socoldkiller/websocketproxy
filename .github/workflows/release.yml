name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Configure musl linker
        run: echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=rust-lld" >> "$GITHUB_ENV"

      - name: Run tests
        run: make test

      - name: Build release binary
        env:
          TARGET_TRIPLE: x86_64-unknown-linux-musl
        run: make release

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/websockproxy-relay
