name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: make test

      - name: Build release binary
        run: make release

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/websockproxy-relay
