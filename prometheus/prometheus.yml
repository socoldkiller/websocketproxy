global:
  scrape_interval: 5s
  scrape_timeout: 4s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Scrape websocketproxy metrics from the host machine.
  # Make sure your relay is listening on 0.0.0.0:80 (or change the port below).
  - job_name: websockproxy_relay
    metrics_path: /metrics
    static_configs:
      - targets: ["127.0.0.1:80"]
